openapi: 3.0.0
info:
  title: Expense Tracker API
  description: API for managing personal expenses, designed for Cloudflare Workers.
  version: 1.0.0
servers:
  - url: /api
    description: Local development server
  - url: https://mony-worker.hgnguyen37.workers.dev
    description: Production server
paths:
  /api/expense:
    get:
      summary: Get expenses for a specific month and year
      description: Fetches a list of all expenses recorded for a given month and year.
      parameters:
        - name: year
          in: query
          required: true
          description: The year to filter expenses by (e.g., 2025).
          schema:
            type: string
            pattern: "^\d{4}$"
        - name: month
          in: query
          required: true
          description: The month to filter expenses by (e.g., 07 for July).
          schema:
            type: string
            pattern: "^\d{2}$"
      responses:
        '200':
          description: A list of expenses for the specified period.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
        '400':
          description: Bad request, likely due to missing or invalid query parameters.
        '500':
          description: Internal server error.
    post:
      summary: Add a new expense
      description: Creates a new expense record in the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewExpense'
      responses:
        '201':
          description: Expense added successfully.
        '400':
          description: Bad request, check the request body for missing fields or invalid data.
        '500':
          description: Internal server error.
    put:
      summary: Update an existing expense
      description: Updates an existing expense record in the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpense'
      responses:
        '200':
          description: Expense updated successfully.
        '400':
          description: Bad request, check the request body for missing fields or invalid data.
        '500':
          description: Internal server error.
    delete:
      summary: Delete an expense
      description: Removes an expense record from the database using its row ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: The row ID of the expense to delete.
              required:
                - id
      responses:
        '200':
          description: Expense deleted successfully.
        '400':
          description: Bad request, ID is likely missing.
        '404':
          description: Expense not found.
        '500':
          description: Internal server error.
    options:
      summary: CORS preflight request
      description: Handles CORS preflight requests to allow cross-origin communication.
      responses:
        '204':
          description: No content, CORS headers are sent.

  /api/summary:
    get:
      summary: Get monthly spending by category
      description: Returns total spending for each category for a given month and year.
      parameters:
        - name: year
          in: query
          required: true
          description: The year to filter summary by (e.g., 2025).
          schema:
            type: string
            pattern: "^\d{4}$"
        - name: month
          in: query
          required: true
          description: The month to filter summary by (e.g., 07 for July).
          schema:
            type: string
            pattern: "^\d{2}$"
      responses:
        '200':
          description: Spending totals by category for the specified period.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category:
                      type: string
                    spend_vnd:
                      type: number
        '400':
          description: Bad request, likely due to missing or invalid query parameters.
        '500':
          description: Internal server error.

  /api/insights:
    get:
      summary: Get financial insights and analytics
      description: Provides insights such as daily spending trends, category spikes, and top transactions.
      responses:
        '200':
          description: Financial insights data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightsResponse'
        '500':
          description: Internal server error.

  /api/config:
    get:
      summary: Get frontend configuration
      description: Returns configuration settings (e.g., budgets, categories) for the frontend application.
      responses:
        '200':
          description: Frontend configuration data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiUrl:
                    type: string
                  monthlyBudget:
                    type: object
                    additionalProperties:
                      type: integer
                  totalBudget:
                    type: integer
                  categoryConfig:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        color:
                          type: string
                  categoryOrder:
                    type: array
                    items:
                      type: string
                  startOfMonthCategories:
                    type: array
                    items:
                      type: string
        '500':
          description: Internal server error.

components:
  schemas:
    Expense:
      type: object
      properties:
        rowid:
          type: integer
          description: The unique identifier for the expense.
        Date:
          type: string
          format: date-time
          description: The date and time of the expense (ISO 8601 format).
        Amount:
          type: number
          description: The amount of the expense.
        Description:
          type: string
          description: A brief description of the expense.
        Category:
          type: string
          description: The category of the expense.
    NewExpense:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The date of the expense (YYYY-MM-DD).
        amount:
          type: number
          description: The amount of the expense.
        description:
          type: string
          description: A brief description of the expense.
        category:
          type: string
          description: The category of the expense.
      required:
        - date
        - amount
        - description
        - category
    UpdateExpense:
      type: object
      properties:
        id:
          type: integer
          description: The row ID of the expense to update.
        date:
          type: string
          format: date
          description: The date of the expense (YYYY-MM-DD).
        amount:
          type: number
          description: The amount of the expense.
        description:
          type: string
          description: A brief description of the expense.
        category:
          type: string
          description: The category of the expense.
      required:
        - id
        - date
        - amount
        - description
        - category
    InsightsResponse:
      type: object
      properties:
        dailySeries:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              total:
                type: number
        dailySpikes:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              total:
                type: number
              multiplier:
                type: number
        categorySpikes:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              current:
                type: number
              percentIncrease:
                type: number
        topTransactions:
          type: array
          items:
            $ref: '#/components/schemas/Expense'
