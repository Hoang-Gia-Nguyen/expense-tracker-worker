<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/png" href="/favico.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">Expense Tracker</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/expense">Expense</a>
                <a class="nav-link active" aria-current="page" href="/summary">Summary</a>
                <a class="nav-link" href="/insights">Insights</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h1 class="mb-4 text-center">Financial Summary</h1>

        <!-- Key Metrics Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="text-muted small">Total Spend (This Month)</div>
                    <h3 id="metric-total-current">-</h3>
                    <div id="metric-change" class="small">-</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="text-muted small">Top Category</div>
                    <h3 id="metric-top-category">-</h3>
                    <div id="metric-top-value" class="small">-</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm text-center p-3">
                    <div class="text-muted small">Avg. Monthly Spend</div>
                    <h3 id="metric-avg">-</h3>
                    <div class="small text-muted">(Last 6 Months)</div>
                </div>
            </div>
        </div>

        <div class="row gy-4">
            <!-- Main Stacked Area Chart -->
            <div class="col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Spending Trends</h5>
                        <div class="chart-container" style="position: relative; height:400px; width:100%">
                            <canvas id="trends-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Current Month Breakdown -->
            <div class="col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Category Breakdown (Current)</h5>
                        <div class="chart-container" style="position: relative; height:400px; width:100%">
                            <canvas id="breakdown-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="category-charts" class="row gy-4 d-none"></div> <!-- Hidden, kept for compatibility -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { createSummaryApp } from '/summary/summary.js';
        const app = createSummaryApp({
            categoryChartsDiv: document.getElementById('category-charts'),
            totalCanvas: document.getElementById('total-chart')
        });
        app.fetchAndRender();
    </script>
</body>
</html>
